app:
  name: back_end_pladonf
  description: ${app.name} is a Spring Boot application
server:
  port: 8000

spring:
  datasource:
    platform: mysql
    url: jdbc:mysql://localhost:${MYSQL_PORT}/${DATABASE_NAME}
    username: ${MYSQL_USER}
    password: ${MYSQL_PASSWORD}
    initialization-mode: always
    dialect: org.hibernate.dialect.MySQLDialect
  db:
  driver: com.mysql.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
      naming:
        strategy: org.hibernate.cfg.ImprovedNamingStrategy
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8080/realms/event-organizer
          jwk-set-uri: http://keycloak:8080/realms/event-organizer/protocol/openid-connect/certs